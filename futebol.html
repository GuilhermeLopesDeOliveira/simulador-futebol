<!DOCTYPE html>
<html>
<head>
    <title>Simulador de Campeonato de Futebol</title>
</head>
<body>

<script>

let pontos = 0;

for (let i = 1; i <= 10; i++) {
    let golsA = Number(prompt("Jogo " + i + " - Gols do time A:"));
    let golsB = Number(prompt("Jogo " + i + " - Gols do adversário:"));

    if (golsA > golsB) {
        pontos += 3;
    } else if (golsA === golsB) {
        pontos += 1;
    }
}

console.log("Total de pontos:", pontos);

</script>

</body>
</html>
